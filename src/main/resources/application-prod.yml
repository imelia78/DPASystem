spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: dpasystem
            client-secret: lFXmacRcaMEaXn9qGm4Y8ibg5QFDUfiM
            client-name: dpasystem
            authorization-grant-type: authorization_code
            scope: openid, profile, email
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/dpasystem/protocol/openid-connect/certs



  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

server:
  port: 8080