spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            provider: keycloak
            client-id: dpasystem
            client-secret: ziV8Oog0bdK8YanKZB6SBSF1Tt18b9dU
            client-name: dpasystem
            authorization-grant-type: authorization_code
            scope: openid, profile, email
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/dpasystem/protocol/openid-connect/certs


  kafka:
    bootstrap-servers: kafka:9092

    producer:
      properties:
        spring.json.add.type.headers: false
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer


  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

server:
  port: 8080