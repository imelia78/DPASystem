services:
  dpa-app:
    build: ./appointment-service
    image: dpasystem-api:latest
    container_name: DPASystem_application
    ports:
      - '127.0.0.1:8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/postgres
      DB_USER: ilia
      DB_PASSWORD: dpasystem
    depends_on:
      db:
        condition: service_healthy
    networks:
      - auth_net

  notification-app:
    build: ./notification-service
    image: notification-service-api:latest
    container_name: notification_application
    ports:
      - '127.0.0.1:8000:8000'
    environment:
      MAIL_USERNAME: healthbridge64@gmail.com
      MAIL_PASSWORD: mfvl bjmv cnws ldtc

    depends_on:
      kafka:
        condition: service_started
    networks:
      - auth_net

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    healthcheck:
     test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
     interval: 10s
     timeout: 5s
     retries: 10

    networks:
      - auth_net



  db:
    image: 'postgres:16'
    container_name: DPASystem_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=ilia
      - POSTGRES_PASSWORD=dpasystem
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL","pg_isready -U ilia -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - auth_net


  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_DATABASE: postgres
      KC_DB_USERNAME: ilia
      KC_DB_PASSWORD: dpasystem
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: dpasystem
    ports:
      - "127.0.0.1:9090:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - auth_net


volumes:
  postgres_data:

networks:
  auth_net:
    driver: bridge
